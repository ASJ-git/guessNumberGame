<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess Number Game</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="scores">
      <p class="high"></p>
      <p class="prev"></p>
    </div>
    <div class="container">
      <h1>Number Guessing Game</h1>
      <p>Guess a number from 1 to 100</p>
      <input type="number" id="guessNo" min="1" max="100" />
      <button href="#" class="btn">Guess</button>
      <p id="result"></p>

      <a href="" class="btn play">Play Again</a>
    </div>
    <footer>
      <p class="copyright">Abrusu Sampson Junior &copy; 2026</p>
    </footer>
    <!-- SCRIPTS  -->
    <script src="main.js"></script>
  </body>
</html>
